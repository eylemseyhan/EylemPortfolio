<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" width="88" height="88" fill="none">

  <!-- Drop shadow -->
  <rect id="shadow" x="6" y="8" width="80" height="78" rx="3"
        fill="rgba(0,0,0,0.07)"/>

  <!-- Note body -->
  <rect id="body" x="4" y="4" width="80" height="78" rx="3"
        stroke="#c8a830" stroke-width="1.8"
        fill="rgba(255,243,176,0.9)"/>

  <!-- Folded top-left corner — dog-ear -->
  <path id="dog-ear"
        d="M4 4 L24 4 L4 22 Z"
        stroke="#c8a830" stroke-width="1" stroke-linejoin="round"
        fill="rgba(235,220,140,0.8)"/>

  <!-- Washi tape strip across top -->
  <rect id="tape" x="30" y="1" width="28" height="9" rx="1.5"
        stroke="rgba(200,184,160,0.5)" stroke-width="1"
        fill="rgba(255,255,255,0.45)"/>

  <!-- Ruled lines -->
  <g id="lines" stroke="rgba(150,180,220,0.45)" stroke-width="0.9">
    <line x1="14" y1="30" x2="74" y2="30"/>
    <line x1="14" y1="42" x2="74" y2="42"/>
    <line x1="14" y1="54" x2="74" y2="54"/>
    <line x1="14" y1="66" x2="74" y2="66"/>
  </g>

  <!-- Red left margin line -->
  <line id="margin" x1="22" y1="16" x2="22" y2="78"
        stroke="rgba(220,80,80,0.28)" stroke-width="1"/>

</svg>
