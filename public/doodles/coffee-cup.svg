<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 80" width="72" height="80" fill="none">

  <!-- Steam curls — three rising wisps -->
  <g id="steam" stroke="#7a5a38" stroke-width="1.8" stroke-linecap="round" fill="none">
    <path d="M20 26 Q16 18 21 10"/>
    <path d="M32 24 Q28 16 33  8"/>
    <path d="M44 26 Q40 18 45 10"/>
  </g>

  <!-- Cup body — slightly tapered, hand-drawn feel -->
  <g id="cup-body">
    <path d="M10 32 Q10 30 12 30 L58 30 Q60 30 60 32 L55 64 Q54 66 52 66 L18 66 Q16 66 15 64 Z"
          stroke="#7a5a38" stroke-width="2.2" stroke-linejoin="round"
          fill="rgba(255,243,176,0.55)"/>
    <!-- Subtle cup sheen line -->
    <line x1="16" y1="38" x2="14" y2="62" stroke="#7a5a38" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  </g>

  <!-- Handle — thick ear handle -->
  <path id="handle"
        d="M58 38 Q72 38 72 50 Q72 62 58 62"
        stroke="#7a5a38" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Saucer — gently curved dish -->
  <path id="saucer"
        d="M4 68 Q18 74 36 74 Q54 74 68 68"
        stroke="#7a5a38" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Heart doodle on cup face -->
  <path id="heart-detail"
        d="M34 46 Q30 40 26 42 Q22 44 26 50 Q30 54 34 56 Q38 54 42 50 Q46 44 42 42 Q38 40 34 46 Z"
        stroke="#7a5a38" stroke-width="1.3" stroke-linejoin="round"
        fill="rgba(255,182,193,0.38)"/>

</svg>
