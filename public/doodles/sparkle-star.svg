<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" fill="none">

  <!-- 4-pointed ✦ sparkle — main star body -->
  <path id="star-body"
        d="M28 3
           C28 3, 30 18, 28 28
           C38 28, 53 28, 53 28
           C53 28, 38 30, 28 28
           C28 38, 28 53, 28 53
           C28 53, 26 38, 28 28
           C18 28, 3 28, 3 28
           C3 28, 18 26, 28 28
           C28 18, 28 3, 28 3 Z"
        stroke="#7a5a38" stroke-width="1.5" stroke-linejoin="round"
        fill="rgba(255,243,176,0.45)"/>

  <!-- Small secondary star tips — gives ✦ its characteristic cross shape -->
  <g id="accent-dots" fill="#7a5a38" opacity="0.5">
    <circle cx="28" cy="4"  r="2"/>
    <circle cx="52" cy="28" r="2"/>
    <circle cx="28" cy="52" r="2"/>
    <circle cx="4"  cy="28" r="2"/>
  </g>

  <!-- Tiny diagonal twinkles -->
  <g id="twinkle-lines" stroke="#7a5a38" stroke-width="1.2" stroke-linecap="round" opacity="0.3">
    <line x1="42" y1="14" x2="44" y2="12"/>
    <line x1="14" y1="42" x2="12" y2="44"/>
    <line x1="42" y1="42" x2="44" y2="44"/>
    <line x1="14" y1="14" x2="12" y2="12"/>
  </g>

</svg>
