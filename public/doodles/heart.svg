<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 58" width="64" height="58" fill="none">

  <!-- Outer heart — main shape, slightly asymmetric for hand-drawn character -->
  <path id="heart-outer"
        d="M32 52
           Q14 40 8 28
           Q3 16 10 10
           Q18 3 28 10
           Q30 12 32 14
           Q34 12 36 10
           Q46 3 54 10
           Q61 16 56 28
           Q50 40 32 52 Z"
        stroke="#7a5a38" stroke-width="2.2" stroke-linejoin="round"
        fill="rgba(255,182,193,0.45)"/>

  <!-- Inner shimmer — suggests volume / highlight -->
  <path id="heart-shimmer"
        d="M20 16 Q16 22 18 28"
        stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Small accent lines — hand-drawn "love" feel -->
  <g id="accent-marks" stroke="#7a5a38" stroke-width="1.2" stroke-linecap="round" opacity="0.4">
    <line x1="48" y1="12" x2="52" y2="8"/>
    <line x1="50" y1="10" x2="54" y2="12"/>
    <line x1="48" y1="8"  x2="52" y2="10"/>
  </g>

</svg>
