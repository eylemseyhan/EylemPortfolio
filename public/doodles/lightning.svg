<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 76" width="48" height="76" fill="none">

  <!-- Outer glow layer — soft halo behind bolt -->
  <path id="glow"
        d="M34 4 L16 40 L26 40 L14 72 L40 30 L28 30 L38 4 Z"
        stroke="rgba(255,220,100,0.35)" stroke-width="6" stroke-linejoin="round"
        fill="none"/>

  <!-- Main bolt -->
  <path id="bolt"
        d="M34 4 L16 40 L26 40 L14 72 L40 30 L28 30 L38 4 Z"
        stroke="#7a5a38" stroke-width="2.2" stroke-linejoin="round"
        fill="rgba(255,243,176,0.6)"/>

  <!-- Tiny spark dots radiating from mid-point -->
  <g id="sparks" fill="#7a5a38" opacity="0.4">
    <circle cx="6"  cy="36" r="2"/>
    <circle cx="44" cy="28" r="1.5"/>
    <circle cx="10" cy="50" r="1.5"/>
    <circle cx="42" cy="44" r="2"/>
  </g>

</svg>
