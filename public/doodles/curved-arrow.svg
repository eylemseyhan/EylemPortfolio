<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 52" width="96" height="52" fill="none">

  <!-- Arrow shaft — looping hand-drawn curve, dashed for sketchy feel -->
  <path id="shaft"
        d="M8 34 Q20 6 52 10 Q78 14 86 34"
        stroke="#7a5a38" stroke-width="2.2" stroke-linecap="round" fill="none"
        stroke-dasharray="6 3.5"/>

  <!-- Arrowhead — slightly irregular, hand-drawn -->
  <path id="arrowhead"
        d="M74 22 L88 36 L76 42"
        stroke="#7a5a38" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- Tail dot -->
  <circle id="tail-dot" cx="8" cy="34" r="2.5" fill="#7a5a38" opacity="0.5"/>

</svg>
