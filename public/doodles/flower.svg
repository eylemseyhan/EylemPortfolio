<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72" fill="none">

  <!-- 6 petals — alternating size for natural feel -->
  <g id="petals-outer">
    <!-- Top -->
    <ellipse cx="36" cy="16" rx="7" ry="14"
             stroke="#7a5a38" stroke-width="1.8"
             fill="rgba(255,214,224,0.5)"/>
    <!-- Top-right -->
    <ellipse cx="52" cy="22" rx="7" ry="14"
             stroke="#7a5a38" stroke-width="1.8"
             fill="rgba(255,214,224,0.45)"
             transform="rotate(60 52 22)"/>
    <!-- Bottom-right -->
    <ellipse cx="52" cy="50" rx="7" ry="14"
             stroke="#7a5a38" stroke-width="1.8"
             fill="rgba(255,214,224,0.5)"
             transform="rotate(120 52 50)"/>
    <!-- Bottom -->
    <ellipse cx="36" cy="56" rx="7" ry="14"
             stroke="#7a5a38" stroke-width="1.8"
             fill="rgba(255,214,224,0.45)"/>
    <!-- Bottom-left -->
    <ellipse cx="20" cy="50" rx="7" ry="14"
             stroke="#7a5a38" stroke-width="1.8"
             fill="rgba(255,214,224,0.5)"
             transform="rotate(60 20 50)"/>
    <!-- Top-left -->
    <ellipse cx="20" cy="22" rx="7" ry="14"
             stroke="#7a5a38" stroke-width="1.8"
             fill="rgba(255,214,224,0.45)"
             transform="rotate(120 20 22)"/>
  </g>

  <!-- Center disc -->
  <circle id="center" cx="36" cy="36" r="11"
          stroke="#7a5a38" stroke-width="2"
          fill="rgba(255,243,176,0.75)"/>

  <!-- Center seeds pattern -->
  <g id="seeds" fill="#7a5a38" opacity="0.35">
    <circle cx="36" cy="31" r="1.5"/>
    <circle cx="40" cy="34" r="1.5"/>
    <circle cx="38" cy="39" r="1.5"/>
    <circle cx="33" cy="40" r="1.5"/>
    <circle cx="30" cy="36" r="1.5"/>
    <circle cx="32" cy="31" r="1.2"/>
  </g>

</svg>
