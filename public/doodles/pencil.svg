<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 80" width="48" height="80" fill="none">

  <!-- Eraser cap -->
  <g id="eraser">
    <rect x="13" y="2" width="22" height="12" rx="2"
          stroke="#7a5a38" stroke-width="1.8"
          fill="rgba(255,182,193,0.55)"/>
    <!-- Eraser band (metal ferrule) -->
    <rect x="13" y="12" width="22" height="5" rx="0"
          stroke="#7a5a38" stroke-width="1.5"
          fill="rgba(180,160,140,0.4)"/>
  </g>

  <!-- Pencil body -->
  <g id="body">
    <rect x="13" y="17" width="22" height="44" rx="1"
          stroke="#7a5a38" stroke-width="2"
          fill="rgba(255,243,176,0.65)"/>
    <!-- Wood grain / label line -->
    <line x1="24" y1="17" x2="24" y2="61"
          stroke="#7a5a38" stroke-width="0.8"
          stroke-dasharray="4 3" opacity="0.22"/>
    <!-- Side edge highlight -->
    <line x1="16" y1="19" x2="16" y2="59"
          stroke="#7a5a38" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
  </g>

  <!-- Sharpened tip section -->
  <g id="tip">
    <path d="M13 61 L24 75 L35 61 Z"
          stroke="#7a5a38" stroke-width="1.8" stroke-linejoin="round"
          fill="rgba(195,155,100,0.45)"/>
    <!-- Graphite core -->
    <path d="M21 69 L24 76 L27 69"
          stroke="#7a5a38" stroke-width="1.4" stroke-linejoin="round"
          fill="rgba(50,40,30,0.4)"/>
  </g>

</svg>
