<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 58" width="80" height="58" fill="none">

  <!-- Crown body — 3-point crown, slightly irregular -->
  <path id="crown-body"
        d="M8 46
           L14 18
           L28 34
           L40 6
           L52 34
           L66 18
           L72 46
           Z"
        stroke="#7a5a38" stroke-width="2.2" stroke-linejoin="round"
        fill="rgba(255,243,176,0.6)"/>

  <!-- Base band -->
  <line id="base-top" x1="8" y1="46" x2="72" y2="46"
        stroke="#7a5a38" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Lower band -->
  <path id="base-bottom"
        d="M6 52 Q40 56 74 52"
        stroke="#7a5a38" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Jewels on crown -->
  <g id="jewels">
    <!-- Center gem — diamond shape -->
    <path d="M40 28 L44 22 L40 16 L36 22 Z"
          stroke="#7a5a38" stroke-width="1.3" stroke-linejoin="round"
          fill="rgba(255,150,150,0.55)"/>
    <!-- Left gem -->
    <circle cx="22" cy="38" r="4"
            stroke="#7a5a38" stroke-width="1.3"
            fill="rgba(200,240,220,0.7)"/>
    <!-- Right gem -->
    <circle cx="58" cy="38" r="4"
            stroke="#7a5a38" stroke-width="1.3"
            fill="rgba(197,232,247,0.7)"/>
    <!-- Small sparkle on each gem -->
    <line x1="22" y1="35" x2="22" y2="37" stroke="#7a5a38" stroke-width="0.8" opacity="0.6"/>
    <line x1="21" y1="36" x2="23" y2="36" stroke="#7a5a38" stroke-width="0.8" opacity="0.6"/>
    <line x1="58" y1="35" x2="58" y2="37" stroke="#7a5a38" stroke-width="0.8" opacity="0.6"/>
    <line x1="57" y1="36" x2="59" y2="36" stroke="#7a5a38" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Star accent above crown tip -->
  <path id="tip-star"
        d="M40 3 L41 5 L43 5 L41.5 6.5 L42 8.5 L40 7.5 L38 8.5 L38.5 6.5 L37 5 L39 5 Z"
        fill="#7a5a38" opacity="0.4"/>

</svg>
