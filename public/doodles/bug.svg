<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72" width="64" height="72" fill="none">

  <!-- Antennae — before body so it renders behind head -->
  <g id="antennae" stroke="#7a5a38" stroke-width="1.8" stroke-linecap="round" fill="none">
    <path d="M24 12 Q16 4 10 2"/>
    <path d="M40 12 Q48 4 54 2"/>
    <!-- Antenna tips -->
    <circle cx="10" cy="2" r="2.5" fill="#7a5a38" opacity="0.55"/>
    <circle cx="54" cy="2" r="2.5" fill="#7a5a38" opacity="0.55"/>
  </g>

  <!-- Head -->
  <ellipse id="head" cx="32" cy="18" rx="14" ry="12"
           stroke="#7a5a38" stroke-width="2"
           fill="rgba(200,240,220,0.55)"/>

  <!-- Eyes -->
  <g id="eyes">
    <ellipse cx="26" cy="16" rx="4" ry="4.5"
             stroke="#7a5a38" stroke-width="1.5" fill="white"/>
    <ellipse cx="38" cy="16" rx="4" ry="4.5"
             stroke="#7a5a38" stroke-width="1.5" fill="white"/>
    <!-- Pupils — slightly off-center for character -->
    <circle cx="27" cy="17" r="2" fill="#3d2b1f"/>
    <circle cx="39" cy="17" r="2" fill="#3d2b1f"/>
    <!-- Eye glints -->
    <circle cx="28" cy="16" r="0.8" fill="white" opacity="0.9"/>
    <circle cx="40" cy="16" r="0.8" fill="white" opacity="0.9"/>
  </g>

  <!-- Smile -->
  <path id="smile" d="M26 23 Q32 27 38 23"
        stroke="#7a5a38" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Body -->
  <ellipse id="body" cx="32" cy="48" rx="18" ry="22"
           stroke="#7a5a38" stroke-width="2"
           fill="rgba(200,240,220,0.55)"/>

  <!-- Wing divider line down body center -->
  <line id="wing-line" x1="32" y1="28" x2="32" y2="68"
        stroke="#7a5a38" stroke-width="1" stroke-dasharray="3 2" opacity="0.4"/>

  <!-- Segment bands across body -->
  <g id="segments" stroke="#7a5a38" stroke-width="1" opacity="0.2">
    <path d="M15 44 Q32 48 49 44"/>
    <path d="M14 54 Q32 58 50 54"/>
    <path d="M15 63 Q32 66 49 63"/>
  </g>

  <!-- Legs — 3 pairs -->
  <g id="legs" stroke="#7a5a38" stroke-width="1.8" stroke-linecap="round" fill="none">
    <path d="M16 40 Q8 36 4 32"/>
    <path d="M16 50 Q8 50 3 48"/>
    <path d="M16 60 Q8 64 5 68"/>
    <path d="M48 40 Q56 36 60 32"/>
    <path d="M48 50 Q56 50 61 48"/>
    <path d="M48 60 Q56 64 59 68"/>
  </g>

</svg>
